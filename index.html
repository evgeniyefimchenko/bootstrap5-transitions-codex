<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Bootstrap 5 transition snippets and Codex Agent Skill.">
    <title>Bootstrap 5 Transitions Codex</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="assets/css/bootstrap5-transitions.css">
    <style>
      .bsx-demo-page {
        background:
          radial-gradient(circle at 10% 0%, rgba(var(--bs-primary-rgb), .12), transparent 32rem),
          var(--bs-body-bg);
        min-height: 100vh;
      }

      .bsx-demo-hero {
        padding-block: clamp(3rem, 8vw, 6rem);
      }

      .bsx-demo-kicker {
        color: var(--bs-primary);
        font-size: .78rem;
        font-weight: 700;
        letter-spacing: .14em;
        text-transform: uppercase;
      }

      .bsx-demo-toolbar {
        backdrop-filter: blur(12px);
        background: rgba(var(--bs-body-bg-rgb), .9);
        border: var(--bs-border-width) solid var(--bs-border-color);
        border-radius: var(--bs-border-radius-xl);
        box-shadow: 0 .75rem 2rem rgba(0, 0, 0, .06);
        position: sticky;
        top: .75rem;
        z-index: 20;
      }

      .bsx-demo-effect-card {
        border-color: var(--bs-border-color-translucent);
        box-shadow: 0 .5rem 1.5rem rgba(0, 0, 0, .04);
        height: 100%;
      }

      .bsx-demo-preview {
        align-items: center;
        background:
          linear-gradient(135deg, rgba(var(--bs-primary-rgb), .055), transparent),
          var(--bs-tertiary-bg);
        border: var(--bs-border-width) solid var(--bs-border-color);
        border-radius: var(--bs-border-radius-lg);
        display: flex;
        min-height: 13rem;
        overflow: auto;
        padding: 1rem;
        position: relative;
      }

      .bsx-demo-preview > * {
        max-width: 100%;
      }

      .bsx-demo-preview .card,
      .bsx-demo-preview .accordion,
      .bsx-demo-preview .navbar,
      .bsx-demo-preview .list-group,
      .bsx-demo-preview .table-responsive,
      .bsx-demo-preview .figure,
      .bsx-demo-preview .carousel,
      .bsx-demo-preview section {
        width: 100%;
      }

      .bsx-demo-code {
        color: var(--bs-primary-text-emphasis);
        overflow-wrap: anywhere;
      }

      .bsx-demo-empty {
        border: 2px dashed var(--bs-border-color);
        border-radius: var(--bs-border-radius-xl);
      }

      @media (min-width: 992px) {
        .bsx-demo-preview {
          min-height: 15rem;
        }
      }
    </style>
  </head>
  <body class="bsx-demo-page">
    <header class="container bsx-demo-hero">
      <div class="row align-items-end gy-4">
        <div class="col-lg-8">
          <p class="bsx-demo-kicker mb-3">CSS-first · Vanilla JS · No dependencies</p>
          <h1 class="display-4 fw-bold mb-3">Bootstrap 5 Transitions Codex</h1>
          <p class="lead text-body-secondary mb-0">
            Copy-paste transition, animation, loading, and micro-interaction snippets plus a Codex Agent Skill.
          </p>
        </div>
        <div class="col-lg-4">
          <div class="d-flex flex-wrap gap-2 justify-content-lg-end">
            <a class="btn btn-outline-secondary bsx-button-hover-lift" href="https://github.com/evgeniyefimchenko/bootstrap5-transitions-codex">
              GitHub
            </a>
            <button class="btn btn-primary bsx-button-press" type="button" data-copy-import>
              Copy CSS import
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="container pb-5">
      <section class="bsx-demo-toolbar p-3 p-md-4 mb-4" aria-label="Catalog filters">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label" for="bsxEffectSearch">Search effects</label>
            <input class="form-control bsx-form-focus-ring" id="bsxEffectSearch" type="search" placeholder="modal, hover, skeleton..." autocomplete="off">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="bsxCategoryFilter">Category</label>
            <select class="form-select" id="bsxCategoryFilter">
              <option value="all">All categories</option>
            </select>
          </div>
          <div class="col-md-3">
            <div class="nav nav-pills nav-fill" role="tablist" aria-label="Effect level">
              <button class="nav-link active bsx-tabs-pill-active-pop" type="button" role="tab" aria-selected="true" data-level="core">Core</button>
              <button class="nav-link bsx-tabs-pill-active-pop" type="button" role="tab" aria-selected="false" data-level="extended">Extended</button>
            </div>
          </div>
        </div>
        <p class="small text-body-secondary mb-0 mt-3" id="bsxResultCount" aria-live="polite"></p>
      </section>

      <noscript>
        <div class="alert alert-warning" role="alert">Enable JavaScript to render and filter the demo catalog. The HTML snippets remain available in the snippets directory.</div>
      </noscript>

      <div class="row g-4" id="bsxEffectGrid"></div>

      <div class="bsx-demo-empty p-5 text-center d-none" id="bsxEmptyState">
        <h2 class="h4">No effects found</h2>
        <p class="text-body-secondary mb-0">Try a different name or category.</p>
      </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" aria-live="polite" aria-atomic="true">
      <div class="toast bsx-toast-pop" id="bsxCopyToast" role="status" aria-live="polite" aria-atomic="true">
        <div class="toast-body" id="bsxCopyToastMessage">Copied.</div>
      </div>
    </div>

    <script src="assets/js/effects-data.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/demo.js"></script>
  </body>
</html>
