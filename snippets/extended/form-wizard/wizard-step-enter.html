<!-- Requires Bootstrap bundle and assets/js/bootstrap5-transitions.js. -->
<form class="bsx-wizard-step-enter">
  <ol class="list-unstyled d-flex mb-3" aria-label="Wizard Step Enter">
    <li class="bsx-step bsx-is-complete"><span class="bsx-step-marker" aria-hidden="true">✓</span>Account</li>
    <li class="bsx-step bsx-is-active" aria-current="step" data-bsx-action="wizard-step"><span class="bsx-step-marker" aria-hidden="true">2</span>Details</li>
    <li class="bsx-step "><span class="bsx-step-marker" aria-hidden="true">3</span>Review</li>
  </ol>
  <div class="card">
    <div class="card-body">
      <label class="form-label" for="bsxWizardStepEnter">Company name</label>
      <input class="form-control " id="bsxWizardStepEnter" type="text" value="Acme Ltd">
      <div class="invalid-feedback">Resolve this step before submitting.</div>
    </div>
    <div class="card-footer d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary">Back</button>
      <button type="button" class="btn btn-primary">Save step</button>
    </div>
  </div>
</form>
