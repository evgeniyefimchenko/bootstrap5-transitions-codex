<form class="bsx-form-wizard-step-error">
  <ol class="list-unstyled d-flex mb-3" aria-label="Form Wizard Step Error">
    <li class="bsx-step bsx-is-complete"><span class="bsx-step-marker" aria-hidden="true">✓</span>Account</li>
    <li class="bsx-step bsx-is-active" aria-current="step"><span class="bsx-step-marker" aria-hidden="true">2</span>Details</li>
    <li class="bsx-step bsx-is-error"><span class="bsx-step-marker" aria-hidden="true">3</span>Review</li>
  </ol>
  <div class="card">
    <div class="card-body">
      <label class="form-label" for="bsxFormWizardStepError">Company name</label>
      <input class="form-control is-invalid" id="bsxFormWizardStepError" type="text" value="Acme Ltd">
      <div class="invalid-feedback">Resolve this step before submitting.</div>
    </div>
    <div class="card-footer d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary">Back</button>
      <button type="submit" class="btn btn-primary">Save step</button>
    </div>
  </div>
</form>
