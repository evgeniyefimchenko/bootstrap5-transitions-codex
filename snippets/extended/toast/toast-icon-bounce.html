<!-- Requires Bootstrap bundle and assets/js/bootstrap5-transitions.js. -->
<button type="button" class="btn btn-primary" data-bsx-action="show-toast" data-bsx-target="#bsxToastIconBounce">
  Show toast
</button>

<div class="toast-container position-fixed top-0 end-0 p-3" aria-live="polite" aria-atomic="true">
  <div class="toast bsx-toast-icon-bounce" id="bsxToastIconBounce" role="status" aria-live="polite" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto">Toast Icon Bounce</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">The operation completed successfully.</div>
  </div>
</div>
