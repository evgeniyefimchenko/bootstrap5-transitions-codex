<!-- Requires Bootstrap bundle and assets/js/bootstrap5-transitions.js. -->
<button type="button" class="btn btn-primary" data-bsx-action="show-toast" data-bsx-target="#bsxToastStackPop">
  Show toast
</button>

<div class="toast-container position-fixed top-0 end-0 p-3" aria-live="polite" aria-atomic="true">
  <div class="toast bsx-toast-stack-pop" id="bsxToastStackPop" role="status" aria-live="polite" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto">Toast Stack Pop</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">The operation completed successfully.</div>
  </div>
  <div class="toast show mt-2" role="status" aria-live="polite" aria-atomic="true">
    <div class="toast-body">Earlier notification in the stack.</div>
  </div>
</div>
